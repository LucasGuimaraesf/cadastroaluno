spring.application.name=cadastroaluno

# ===== Conexão com o PostgreSQL =====
# Valores padrão para rodar na IDE (banco em localhost).
# No Docker, estes valores são SOBRESCRITOS pelas variáveis de ambiente
# SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD passadas no "docker run".
spring.datasource.url=jdbc:postgresql://localhost:5432/cadastroaluno
spring.datasource.username=postgres
spring.datasource.password=postgres

# ===== JPA / Hibernate =====
# "update" = o Hibernate cria/atualiza a tabela 'aluno' automaticamente a partir da classe Aluno.
spring.jpa.hibernate.ddl-auto=update
# Mostra no console o SQL que o Hibernate executa (ótimo para aprender e depurar).
spring.jpa.show-sql=true
