<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-mortarboard-fill me-2"></i>Sistema de Cadastro de Alunos
        </span>
        <div class="text-white">
            <i class="bi bi-person-circle me-1"></i>
            <span th:text="${session.usuarioLogado.login}">user</span>
            <span class="badge bg-light text-dark" th:text="${session.usuarioLogado.perfil}">PERFIL</span>
            <a href="/logout" class="btn btn-outline-light btn-sm ms-2">
                <i class="bi bi-box-arrow-right me-1"></i>Sair
            </a>
        </div>
    </div>
</nav>


<div class="container my-5">

    <div th:if="${msg}" class="alert alert-success alert-dismissible fade show d-flex align-items-center" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${msg}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
            <h5 class="mb-0"><i class="bi bi-people-fill me-2 text-primary"></i>Alunos Cadastrados</h5>
            <a href="/novo" class="btn btn-success">
                <i class="bi bi-plus-circle me-1"></i>Novo Aluno
            </a>
        </div>

        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4">Nome</th>
                        <th>Matrícula</th>
                        <th>Curso</th>
                        <th>Período</th>
                        <th class="text-end pe-4">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="a : ${alunos}">
                        <td class="ps-4" th:text="${a.nome}"></td>
                        <td th:text="${a.matricula}"></td>
                        <td th:text="${a.curso}"></td>
                        <td th:text="${a.periodo}"></td>
                        <td class="text-end pe-4">
                            <div th:if="${session.usuarioLogado.perfil == 'ADMIN'}">
                                <a th:href="@{'/editar/' + ${a.id}}" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-pencil-square"></i> Editar
                                </a>
                                <a th:href="@{'/excluir/' + ${a.id}}" class="btn btn-outline-danger btn-sm"
                                   onclick="return confirm('Tem certeza que deseja excluir o cadastro?')">
                                    <i class="bi bi-trash"></i> Excluir
                                </a>
                            </div>
                            <span th:if="${session.usuarioLogado.perfil != 'ADMIN'}" class="text-muted small">Somente leitura</span>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(alunos)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            <i class="bi bi-inbox me-1"></i>Nenhum aluno cadastrado ainda.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
