<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-mortarboard-fill me-2"></i>Sistema de Cadastro de Alunos
        </span>
    </div>
</nav>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-danger shadow-sm">
                <div class="card-body text-center p-5">
                    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
                    <h4 class="mt-3">Ops! Algo deu errado</h4>
                    <p class="text-muted" th:text="${mensagemErro}">Mensagem de erro aqui.</p>
                    <a href="/" class="btn btn-primary mt-2">
                        <i class="bi bi-arrow-left me-1"></i>Voltar para a lista
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
