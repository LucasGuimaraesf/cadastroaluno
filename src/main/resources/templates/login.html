<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">
            <i class="bi bi-mortarboard-fill me-2"></i>Sistema de Cadastro de Alunos
        </span>
    </div>
</nav>

<div class="container my-5">
    <h2 class="text-center mb-4">Bem-vindo! Escolha seu acesso</h2>

    <!-- Mensagem de erro (aparece só quando o login falha) -->
    <div th:if="${erro}" class="alert alert-danger text-center" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i><span th:text="${erro}"></span>
    </div>

    <div class="row justify-content-center g-4">

        <!-- ===== Card ADMINISTRADOR ===== -->
        <div class="col-md-5">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-shield-lock-fill text-primary" style="font-size: 2.5rem;"></i>
                    <h4 class="mt-2">Administrador</h4>
                    <p class="text-muted">Acesso total (inserir, editar e excluir).</p>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3 text-start">
                            <label class="form-label">Login</label>
                            <input type="text" name="login" class="form-control" placeholder="admin">
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label">Senha</label>
                            <input type="password" name="senha" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Entrar como Admin
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- ===== Card COLABORADOR ===== -->
        <div class="col-md-5">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-body p-4 text-center">
                    <i class="bi bi-person-badge text-success" style="font-size: 2.5rem;"></i>
                    <h4 class="mt-2">Colaborador</h4>
                    <p class="text-muted">Acesso limitado (inserir e visualizar).</p>
                    <form th:action="@{/login}" method="post">
                        <div class="mb-3 text-start">
                            <label class="form-label">Login</label>
                            <input type="text" name="login" class="form-control" placeholder="colab">
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label">Senha</label>
                            <input type="password" name="senha" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-success w-100">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Entrar como Colaborador
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
